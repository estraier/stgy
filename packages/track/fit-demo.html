<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIT / TrackJSON demo</title>
  <link rel="stylesheet" href="./dist/track-viewer.css">
  <style>
    .fit-demo {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      font-family: system-ui, sans-serif;
    }

    .fit-demo-panel {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .fit-demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .fit-demo-row label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .fit-demo-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .fit-demo-status {
      min-height: 1.5em;
      color: #333;
    }

    .fit-demo-status.is-error {
      color: #b00020;
    }

    .fit-demo-summary {
      display: grid;
      gap: 2px;
      margin: 12px 0;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 0.9em;
    }

    .fit-demo-zone-histogram {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }

    .fit-demo-zone-title {
      font-weight: 600;
    }

    .fit-demo-zone-row {
      display: grid;
      grid-template-columns: minmax(300px, 420px) 1fr;
      gap: 10px;
      align-items: center;
    }

    .fit-demo-zone-label {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .fit-demo-zone-bar-track {
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #eee;
    }

    .fit-demo-zone-bar {
      height: 100%;
      border-radius: inherit;
      background: #777;
    }


    .fit-demo-power-curve {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }

    .fit-demo-power-curve-svg {
      width: 100%;
      height: auto;
      overflow: visible;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }

    @media (max-width: 720px) {
      .fit-demo-zone-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    .fit-demo-map-output {
      margin: 16px 0;
    }

    .fit-demo-track-json {
      width: 100%;
      min-height: 280px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="fit-demo">
    <h1>FIT / TrackJSON demo</h1>

    <section class="fit-demo-panel">
      <div class="fit-demo-row">
        <label>
          File(s)
          <input
            id="fit-demo-file"
            type="file"
            multiple
            accept=".fit,.trj,.json,.geojson,.trjgz,application/json,application/gzip,application/octet-stream">
        </label>
      </div>

      <div class="fit-demo-row">
        <label>
          <input id="fit-demo-downsample" type="checkbox">
          Downsample input
        </label>

        <label>
          Strategy
          <select id="fit-demo-downsample-strategy">
            <option value="uniform">Uniform</option>
            <option value="aggregate" selected>Aggregate</option>
          </select>
        </label>

        <label>
          Max points
          <input id="fit-demo-max-points" type="number" min="2" step="1" value="10000">
        </label>

        <label>
          <input id="fit-demo-preserve-endpoints" type="checkbox" checked>
          Preserve endpoints
        </label>
      </div>

      <div class="fit-demo-row">
        <label>
          <input id="fit-demo-obfuscate-privacy" type="checkbox">
          Obfuscate privacy
        </label>

        <label>
          Start distance (m)
          <input
            id="fit-demo-obfuscate-start-distance"
            type="number"
            min="0"
            step="1"
            value="1000">
        </label>

        <label>
          End distance (m)
          <input
            id="fit-demo-obfuscate-end-distance"
            type="number"
            min="0"
            step="1"
            value="1000">
        </label>
      </div>

      <div class="fit-demo-row">
        <label>
          <input id="fit-demo-print-analysis" type="checkbox">
          Print analysis
        </label>

        <label>
          FTP (W)
          <input
            id="fit-demo-ftp"
            type="number"
            min="1"
            step="1"
            value="223"
            disabled>
        </label>

        <label>
          LTHR (bpm)
          <input
            id="fit-demo-lthr"
            type="number"
            min="1"
            step="1"
            value="151"
            disabled>
        </label>
      </div>

      <div class="fit-demo-row">
        <label>
          <input id="fit-demo-pretty" type="checkbox">
          Pretty-print TrackJSON
        </label>
      </div>

      <div class="fit-demo-actions">
        <button id="fit-demo-convert" type="button">Convert and render</button>
        <button id="fit-demo-copy" type="button" disabled>Copy TrackJSON</button>
        <a id="fit-demo-download" href="#" download="track.trj" hidden>Download TrackJSON</a>
        <a
          id="fit-demo-download-compressed"
          href="#"
          download="track.trjgz"
          hidden>(compressed)</a>
        <a
          id="fit-demo-download-obfuscated-fit"
          href="#"
          download="track.obfuscated.fit"
          hidden>Download obfuscated FIT</a>
      </div>

      <div id="fit-demo-status" class="fit-demo-status" role="status"></div>
    </section>

    <div id="fit-demo-map-output" class="fit-demo-map-output"></div>
    <div id="fit-demo-summary" class="fit-demo-summary" hidden></div>
    <textarea
      id="fit-demo-track-json"
      class="fit-demo-track-json"
      readonly
      spellcheck="false"></textarea>
  </main>

  <script src="./dist/track-viewer.js"></script>
  <script src="./dist/fit-demo.js"></script>
  <script>
    StgyFitDemo.initFitDemo();
  </script>
</body>
</html>
